<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Productos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Ruta absoluta al CSS -->
  <link rel="stylesheet" href="/style.css">
  <style>
    .producto {
      display: flex;
      align-items: flex-start;
      margin-bottom: 20px;
    }
    .producto label {
      display: flex;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.4;
    }
    .producto input[type="radio"] {
      margin-right: 8px;
      margin-top: 3px;
    }
    .producto span {
      display: inline-block;
      max-width: 250px;
      word-wrap: break-word;
    }
    #mensaje {
      text-align: center;
      margin-top: 15px;
      font-size: 14px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="/logo-officebanking.png" alt="Office Banking" class="logo">

    <h1>PRODUCTOS DISPONIBLES PARA TU EMPRESA:</h1>

    <!-- Contenedor dinámico -->
    <div id="listaProductos"></div>

    <button class="btn-santander" id="quieroBtn">
      LO QUIERO<span class="bg-arrow"></span>
    </button>

    <div id="mensaje"></div>
  </div>
 
  <!-- Puedes dejar el script incrustado o moverlo a productos.js -->
  <script src="/productos.js"></script>
</body>
</html>
